<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="color-scheme" content="light">
	<meta name="theme-color" content="#ffffff">
    <title>语音电台</title>
    <style>
        * { -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        
        :root { --bg: #fff9f5; --accent: #ff7e5f; --text: #4a4a4a; --muted: #a8a8a8; }

        body {
            margin: 0; padding: 0; 
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
            overscroll-behavior: none;
            background: url('singback.jpg') center/cover no-repeat fixed;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 2px solid rgba(0, 0, 0, 0.8);
            border-left: 1.5px solid rgba(0, 0, 0, 0.15);
            border-right: 1.5px solid rgba(0, 0, 0, 0.15);
            border-top: none;
            padding: calc(12px + env(safe-area-inset-top)) 16px 12px 16px;
            border-radius: 0 0 24px 24px;
            display: flex; align-items: center; z-index: 100;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        }
        
        .back-btn { color: #111; text-decoration: none; font-size: 20px; margin-right: 15px; font-weight: 900; text-shadow: none; }
        .title-box { flex: 1; display: flex; flex-direction: row; align-items: baseline; gap: 8px; }
        .title { font-size: 18px; font-weight: 900; color: #111; margin: 0; text-shadow: none; letter-spacing: 1px;}
        .sub-title { font-size: 11px; color: #444; text-shadow: none; font-weight: bold;}

        .player-main { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            position: relative; width: 100%;
        }

        .turntable-wrapper {
            position: absolute;
            top: 48%; left: 50%;
            transform: translate(-50%, -50%);
            width: 260px; height: 260px; 
            z-index: 10;
        }

        .needle {
            position: absolute; 
            top: -15px; right: 20px; 
            width: 85px; height: 130px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 150"><path d="M10 0 L15 120 L5 120 Z" fill="%23ddd" stroke="%23aaa" stroke-width="1"/><circle cx="10" cy="10" r="8" fill="%23bbb"/></svg>') no-repeat;
            transform-origin: 10px 10px; transform: rotate(-25deg);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); z-index: 20;
        }
        body.playing .needle { transform: rotate(2deg); }

        .record-canvas { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .record-disc { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, #333 0%, #111 70%, #000 100%); border-radius: 50%; border: 8px solid #222; box-shadow: 0 15px 45px rgba(0,0,0,0.3); }
        
        .record-center { 
            width: 85px; height: 85px; 
            background: transparent;
            border-radius: 50%; border: 4px solid #111; z-index: 5; 
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            overflow: hidden; 
        }
        .record-center img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        @keyframes discRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinning { animation: discRotate 12s linear infinite; }
        body.paused .spinning { animation-play-state: paused; }

        .lyric-card {
            width: 85%; height: 95px; 
            margin-top: auto; margin-bottom: 5px; 
            background: transparent; display: flex; flex-direction: column; align-items: center; 
            text-align: center; flex-shrink: 0; z-index: 5;
        }

        .lyric-scroll {
            flex: 1; width: 100%; display: flex; flex-direction: column;
            overflow-y: auto; -webkit-overflow-scrolling: touch; 
            margin-bottom: 8px; padding: 0 10px; box-sizing: border-box;
        }

        .lyric-scroll::-webkit-scrollbar { width: 4px; }
        .lyric-scroll::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.3); border-radius: 4px; }
        .lyric-scroll::-webkit-scrollbar-track { background: transparent; }

        .lyric-text { 
            color: #ffffff; font-size: 15px; line-height: 1.7; font-weight: 800; 
            transition: opacity 0.3s; word-break: break-word; margin: auto 0; padding: 10px 0 2px 0; 
            text-shadow: 0 2px 6px rgba(0,0,0,0.9), 0 0 4px rgba(0,0,0,0.9);
        }
        
        .lyric-meta { 
            display: flex; align-items: center; justify-content: center; font-size: 11px; 
            color: #ffffff; font-family: Courier; flex-shrink: 0; font-weight: bold;
            text-shadow: 0 1px 4px rgba(0,0,0,0.9);
        }

        .controls-wrapper { width: 100%; padding-bottom: calc(30px + env(safe-area-inset-bottom)); }
        
        .progress-container { 
            width: 85%; margin: 0 auto 25px auto; display: flex; align-items: center; 
            justify-content: space-between; font-size: 11px; color: #ffffff; font-family: Courier; 
            font-weight: bold; text-shadow: 0 1px 4px rgba(0,0,0,0.9);
        }
        .progress-bar { 
            flex: 1; height: 4px; background: rgba(255, 255, 255, 0.25); 
            margin: 0 15px; border-radius: 2px; position: relative; cursor: pointer; 
            padding: 10px 0; background-clip: content-box; box-shadow: inset 0 1px 2px rgba(0,0,0,0.2);
        }
        .progress-fill { 
            width: 0%; height: 100%; background: #ffffff; border-radius: 2px; 
            position: relative; pointer-events: none; transition: width 0.1s linear; 
            box-shadow: 0 0 5px rgba(255,255,255,0.6);
        }
        .progress-thumb { 
            position: absolute; right: -5px; top: -3px; width: 10px; height: 10px; 
            background: #ffffff; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.5); 
        }

        .player-controls { display: flex; align-items: center; justify-content: space-evenly; width: 100%; }
        
        .btn-circle { 
            width: 48px; height: 48px; 
            background: rgba(255, 255, 255, 0.35); 
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center; 
            transition: transform 0.2s, background 0.2s; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .btn-circle img { 
            width: 20px; height: 20px; object-fit: contain; pointer-events: none; 
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.4)); 
        }
        
        .btn-play { width: 62px; height: 62px; }
        .btn-play img { width: 28px; height: 28px; }
        
        .btn-circle:active { transform: scale(0.9); background: rgba(255, 255, 255, 0.5); }

        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="paused">

    <div class="header">
	
	
        <a href="javascript:void(0)" onclick="history.back()" class="back-btn">←</a>
		
		
        <div class="title-box">
            <h1 class="title">语音电台</h1>
            <span class="sub-title" id="radio-stat">正在检索瞬间...</span>
        </div>
    </div>

    <div class="player-main fade-in">
        <div class="turntable-wrapper">
            <div class="needle" id="needle"></div>
            <div class="record-canvas">
                <div class="record-disc spinning"></div>
                <div class="record-center spinning">
                    <img src="cover.jpg" alt="" onerror="this.style.display='none'">
                </div>
            </div>
        </div>

        <div class="lyric-card">
            <div class="lyric-scroll" id="lyric-wrapper">
                <div class="lyric-text" id="lyric-content">点击下方播放按钮<br>开启我们的独家调频</div>
            </div>
            <div class="lyric-meta">
                <span id="lyric-time"></span>
                <span id="fav-btn" onclick="toggleFav()" style="display:inline-block; font-size:16px; margin-left:8px; cursor:pointer; transition: color 0.3s; display:none; position: relative; top: -2px;">☆</span>
            </div>
        </div>
    </div>

    <div class="controls-wrapper fade-in" style="animation-delay: 0.2s">
        <div class="progress-container">
            <span id="time-current">00:00</span>
            <div class="progress-bar" id="progress-bg" onclick="seekAudio(event)">
                <div class="progress-fill" id="progress-fill">
                    <div class="progress-thumb"></div>
                </div>
            </div>
            <span id="time-total">00:00</span>
        </div>

        <div class="player-controls">
            <div class="btn-circle" onclick="playPrev()">
                <img src="up.png" alt="上一首">
            </div>
            <div class="btn-circle btn-play" id="playBtn" onclick="togglePlay()">
                <img id="playIcon" src="start.png" alt="Play/Pause">
            </div>
            <div class="btn-circle" onclick="playNext()">
                <img src="down.png" alt="下一首">
            </div>
        </div>
    </div>

    <audio id="main-audio"></audio>

    <script src="chatData.js"></script>
    <script>
        const audio = document.getElementById('main-audio');
        const allData = window.WEFLOW_DATA || [];
        
        const rawVoiceData = allData.filter(item => item.b.includes('<audio'));
        const parser = new DOMParser();
        
        const voiceData = rawVoiceData.map(item => {
            const doc = parser.parseFromString(item.b, 'text/html');
            return {
                src: doc.querySelector('audio')?.getAttribute('src'),
                text: doc.querySelector('.message-text')?.innerText || "",
                t: item.t,
                rawItem: item 
            }
        }).filter(v => v.src);

        let isPlaying = false;
        let historyStack = []; 
        let historyPointer = -1;

        document.getElementById('radio-stat').innerText = `共收录了 ${voiceData.length} 段瞬间`;

        /* ================= BGM 智能通讯系统 ================= */
        function pauseGlobalBGM() {
            try { window.parent.postMessage('pauseBGM', '*'); } catch(e) {}
        }
        function resumeGlobalBGM() {
            try { window.parent.postMessage('resumeBGM', '*'); } catch(e) {}
        }

        // ★ 修改：页面加载即发出暂停背景音乐指令
        pauseGlobalBGM();

        /* ================= 播放控制模块 ================= */
        function togglePlay() {
            if (historyPointer === -1) { playNext(); return; }
            if (isPlaying) { audio.pause(); } else { 
                pauseGlobalBGM(); 
                audio.play().catch(e => console.log("播放失败")); 
            }
            if(window.navigator.vibrate) window.navigator.vibrate(30);
        }

        audio.onplay = () => { 
            isPlaying = true; document.body.className = 'playing'; 
            document.getElementById('playIcon').src = 'stop.png'; 
            pauseGlobalBGM(); // 确保电台出声时背景音乐一定闭嘴
        };
        
        audio.onpause = () => { 
            isPlaying = false; document.body.className = 'paused'; 
            document.getElementById('playIcon').src = 'start.png'; 
        };
        
        audio.onended = () => { playNext(); };

        function renderTrack(index) {
            const item = voiceData[index];
            const lyricEl = document.getElementById('lyric-content');
            const wrapperEl = document.getElementById('lyric-wrapper');
            document.getElementById('progress-fill').style.width = '0%';
            document.getElementById('time-current').innerText = '00:00';
            document.getElementById('time-total').innerText = '00:00';
            document.getElementById('fav-btn').style.display = 'inline-block'; 
            checkFavStatus(item.rawItem);
            lyricEl.style.opacity = '0';
            setTimeout(() => {
                let cleanText = item.text.replace(/\[语音转文字\]/g, '').trim();
                if (cleanText.includes('转文字失败')) { cleanText = "[不知道在说什么，有可能是在唱歌]"; }
                lyricEl.innerText = cleanText || "(纯语音，无文字记录)";
                wrapperEl.scrollTop = 0; lyricEl.style.opacity = '1';
                const d = new Date(item.t * 1000);
                document.getElementById('lyric-time').innerText = 
                    `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
            }, 300);
            audio.src = item.src;
            pauseGlobalBGM(); 
            audio.play().catch(e => { console.warn("音频加载失败:", item.src); setTimeout(playNext, 1500); });
            if(window.navigator.vibrate) window.navigator.vibrate([20, 50]);
        }

        function playNext() {
            if (voiceData.length === 0) return;
            if (historyPointer < historyStack.length - 1) { historyPointer++; } else {
                let newIndex = Math.floor(Math.random() * voiceData.length);
                historyStack.push(newIndex); historyPointer++;
            }
            renderTrack(historyStack[historyPointer]);
        }

        function playPrev() {
            if (voiceData.length === 0) return;
            if (historyPointer > 0) { historyPointer--; renderTrack(historyStack[historyPointer]); } else {
                if(window.navigator.vibrate) window.navigator.vibrate(50);
            }
        }

        audio.addEventListener('timeupdate', () => {
            if (!audio.duration) return;
            const percent = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progress-fill').style.width = percent + '%';
            document.getElementById('time-current').innerText = formatTime(audio.currentTime);
        });

        audio.addEventListener('loadedmetadata', () => { document.getElementById('time-total').innerText = formatTime(audio.duration); });

        function seekAudio(e) {
            if (!audio.duration) return;
            const bar = document.getElementById('progress-bg');
            const rect = bar.getBoundingClientRect();
            let percent = (e.clientX - rect.left) / rect.width;
            percent = Math.max(0, Math.min(1, percent)); 
            audio.currentTime = percent * audio.duration;
            if(window.navigator.vibrate) window.navigator.vibrate(20);
        }

        function formatTime(seconds) {
            if(isNaN(seconds) || !isFinite(seconds)) return "00:00";
            const m = Math.floor(seconds / 60); const s = Math.floor(seconds % 60);
            return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
        }

        function checkFavStatus(rawItem) {
            let favs = JSON.parse(localStorage.getItem('chat_favs') || '[]');
            const isFav = favs.some(f => f.t === rawItem.t && f.b === rawItem.b);
            const btn = document.getElementById('fav-btn');
            btn.innerText = isFav ? '⭐' : '☆';
            btn.style.color = isFav ? '#ffffff' : 'rgba(255,255,255,0.5)';
            btn.style.textShadow = isFav ? '0 0 8px rgba(255,255,255,0.8)' : 'none';
        }

        function toggleFav() {
            if (historyPointer === -1) return;
            const rawItem = voiceData[historyStack[historyPointer]].rawItem;
            let favs = JSON.parse(localStorage.getItem('chat_favs') || '[]');
            const index = favs.findIndex(f => f.t === rawItem.t && f.b === rawItem.b);
            const btn = document.getElementById('fav-btn');
            if (index > -1) {
                favs.splice(index, 1); btn.innerText = '☆'; btn.style.color = 'rgba(255,255,255,0.5)'; btn.style.textShadow = 'none';
            } else {
                favs.unshift(rawItem); btn.innerText = '⭐'; btn.style.color = '#ffffff'; btn.style.textShadow = '0 0 8px rgba(255,255,255,0.8)';
                btn.style.opacity = '0.5'; setTimeout(() => btn.style.opacity = '1', 150);
            }
            localStorage.setItem('chat_favs', JSON.stringify(favs));
            if(window.navigator.vibrate) window.navigator.vibrate([30, 30]);
        }

        
        window.history.pushState(null, null, window.location.href);
        window.addEventListener('popstate', function () { resumeGlobalBGM(); window.location.replace('menu.html'); });
    </script>
</body>
</html>
