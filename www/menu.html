<!DOCTYPE html>
<html style="background-color: #fff9f5;">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
	<meta name="color-scheme" content="light">
	<meta name="theme-color" content="#ffffff">
    <title>menu</title>
    <style>
		* {
            -webkit-tap-highlight-color: transparent; 
            -webkit-touch-callout: none; 
            -webkit-user-select: none; 
            user-select: none;
        }
		
        ::-webkit-scrollbar { display: none; width: 0; height: 0; color: transparent; }
        html, body { -ms-overflow-style: none; scrollbar-width: none; }
        
        :root {
            --theme-color: #111; 
        }

        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            color: #4a4a4a;
            height: 100vh; 
            overflow: hidden; 
            overscroll-behavior: none;
            opacity: 0; 
            background: url('icon/birback.jpg') center/cover no-repeat fixed;
        }

        .anim-cold-start { animation: smoothEnter 1.2s ease-out forwards; }
        .anim-back-fast { animation: fastFade 0.2s ease-out forwards; }
        @keyframes smoothEnter { 0% { opacity: 0; transform: translateY(15px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes fastFade { 0% { opacity: 0; } 100% { opacity: 1; } }

		.gift-header {
            width: 100%; height: 260px; 
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.6) 0%, rgba(255, 255, 255, 0.15) 100%);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            
            border-bottom: 2px solid rgba(0, 0, 0, 0.8);
            border-left: 1.5px solid rgba(0, 0, 0, 0.15);
            border-right: 1.5px solid rgba(0, 0, 0, 0.15);
            border-top: none;
            
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            border-radius: 0 0 24px 24px; 
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
            position: relative;
            padding-top: calc(10px + env(safe-area-inset-top));
            padding-bottom: 20px; box-sizing: border-box;
        }

        .avatar {
            width: 75px; height: 75px;
            border: 3px solid rgba(255, 255, 255, 0.9); border-radius: 50%;
            margin-bottom: 12px; background: rgba(255, 255, 255, 0.5);
            display:flex; align-items:center; justify-content:center; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10; overflow: hidden;
            box-shadow: 0 6px 16px rgba(0,0,0,0.12);
        }
        .avatar.active { transform: scale(1.15) rotate(360deg); border-color: #fff; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        
        .gift-header h1 { 
            margin: 0; font-size: 20px; font-weight: 900; 
            background: linear-gradient(135deg, #ff4444 0%, #ff7e5f 100%);
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }

        .timer-box {
            margin-top: 8px; font-size: 11px;
            background: rgba(255, 255, 255, 0.5);
            color: #111;
            padding: 4px 14px; border-radius: 20px;
            font-weight: 900; text-shadow: none;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* ★ 赛博霓虹彩蛋基础设定 */
        #secret-code {
            position: absolute; 
            bottom: 70px; 
            font-family: "Courier New", Courier, monospace;
            font-weight: 900; font-size: 28px; letter-spacing: 8px;
            opacity: 0; transform: translateY(20px);
            transition: all 0.4s ease; pointer-events: none; z-index: 5;
        }
        #secret-code.show { opacity: 1; transform: translateY(0); }

        /* ★ 8位数字，8种高纯度霓虹发光色 */
        #secret-code span { color: #ffffff; display: inline-block; }
        #secret-code span:nth-child(1) { text-shadow: 0 0 8px #ff3366, 0 0 15px #ff3366, 0 0 30px #ff3366; } /* 霓虹红 */
        #secret-code span:nth-child(2) { text-shadow: 0 0 8px #ff9933, 0 0 15px #ff9933, 0 0 30px #ff9933; } /* 霓虹橙 */
        #secret-code span:nth-child(3) { text-shadow: 0 0 8px #ffcc00, 0 0 15px #ffcc00, 0 0 30px #ffcc00; } /* 霓虹黄 */
        #secret-code span:nth-child(4) { text-shadow: 0 0 8px #00ff66, 0 0 15px #00ff66, 0 0 30px #00ff66; } /* 霓虹青 */
        #secret-code span:nth-child(5) { text-shadow: 0 0 8px #00ffff, 0 0 15px #00ffff, 0 0 30px #00ffff; } /* 霓虹冰蓝 */
        #secret-code span:nth-child(6) { text-shadow: 0 0 8px #3399ff, 0 0 15px #3399ff, 0 0 30px #3399ff; } /* 霓虹深蓝 */
        #secret-code span:nth-child(7) { text-shadow: 0 0 8px #cc33ff, 0 0 15px #cc33ff, 0 0 30px #cc33ff; } /* 霓虹紫 */
        #secret-code span:nth-child(8) { text-shadow: 0 0 8px #ff33cc, 0 0 15px #ff33cc, 0 0 30px #ff33cc; } /* 霓虹粉 */
		
		/* ★ 为霓虹代码添加波浪悬浮动效 */
        @keyframes neonWave {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.15); }
        }
        
        #secret-code.show span {
            animation: neonWave 1.2s ease-in-out infinite;
        }
        
        #secret-code.show span:nth-child(1) { animation-delay: 0.0s; }
        #secret-code.show span:nth-child(2) { animation-delay: 0.1s; }
        #secret-code.show span:nth-child(3) { animation-delay: 0.2s; }
        #secret-code.show span:nth-child(4) { animation-delay: 0.3s; }
        #secret-code.show span:nth-child(5) { animation-delay: 0.4s; }
        #secret-code.show span:nth-child(6) { animation-delay: 0.5s; }
        #secret-code.show span:nth-child(7) { animation-delay: 0.6s; }
        #secret-code.show span:nth-child(8) { animation-delay: 0.7s; }

		.content-list { 
            width: 90%; 
            margin-top: -30px; 
            display: flex; flex-direction: column;
            gap: 10px; z-index: 15; 
        }

        .memory-card {
            background: rgba(255, 255, 255, 0.65); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 25px; padding: 22px;
            width: 100%; display: flex; 
            flex-direction: column;
            align-items: center; 
            text-decoration: none; color: inherit;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
            box-sizing: border-box;
            position: relative;
            text-align: center;
        }

        .sub-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px; 
            width: 100%;
        }

        .sub-item {
            background: rgba(255, 255, 255, 0.65); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 22px; padding: 18px 10px;
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; color: inherit;
            box-shadow: 0 8px 25px rgba(0,0,0,0.06); 
            text-align: center; box-sizing: border-box;
        }
        
        .memory-card:active, .sub-item:active { transform: scale(0.96); background: rgba(255, 255, 255, 0.8); }

        .icon-lg { 
            width: 48px; height: 48px; margin-bottom: 8px; 
            display: flex; align-items: center; justify-content: center;
        }
        .icon-lg img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15)); }

        .icon-sm { 
            width: 32px; height: 32px; margin-bottom: 6px; 
            display: flex; align-items: center; justify-content: center; font-size: 26px; 
        }
        .icon-sm img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.12)); }
        
        .title-box b { display: block; font-size: 16px; font-weight: 800; color: #111; margin-bottom: 4px; text-shadow: 0 2px 4px rgba(255,255,255,0.8);}
        .title-box span { font-size: 12px; font-weight: bold; color: #555; }

        .sub-item b { font-size: 14px; font-weight: 800; color: #111; display: block; margin-bottom: 2px; text-shadow: 0 2px 4px rgba(255,255,255,0.8);}
        .sub-item span { font-size: 10px; font-weight: bold; color: #555; }

        .footer-area {
            flex: 1; display: flex; flex-direction: column;
            justify-content: flex-end; width: 100%;
            padding-bottom: calc(8px + env(safe-area-inset-bottom)); 
        }

        .wish {
            text-align: center; line-height: 1.5; color: #fff; font-size: 11px;
            margin-bottom: 5px; 
            text-shadow: 0 1px 4px rgba(0,0,0,0.7), 0 0 2px rgba(0,0,0,0.5);
            font-weight: bold;
        }
		
        .highlight { 
            color: #ff4444; 
            font-weight: 900; 
            text-shadow: 0 1px 6px rgba(255, 68, 68, 0.5);
        }

        .footer-link {
            text-decoration: none; color: #333; font-size: 10px; opacity: 0.7; 
            text-shadow: 0 1px 3px rgba(255,255,255,0.8);
            font-weight: bold;
        }

        #particle-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9;
        }
    </style>
</head>
<body>
    <script>
        (function() {
            const hasOpened = sessionStorage.getItem('menu_opened');
            if (!hasOpened) {
                document.body.className = 'anim-cold-start';
                sessionStorage.setItem('menu_opened', 'true');
            } else {
                document.body.className = 'anim-back-fast';
            }
        })();
    </script>

    <div id="particle-container"></div>

    <div class="gift-header">
        <div class="avatar" id="cake-avatar"><img src="icon/cake.png" alt="cake"></div>
        <h1 id="user-name">致：她的名字</h1>
        <div class="timer-box" id="together-timer">载入中...</div>
        
        <div id="secret-code">
            <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span>
        </div>
    </div>

    <div class="content-list">
        <a href="OurStory.html" class="memory-card">
            <div class="icon-lg"><img src="icon/letter.png" alt="回忆长廊"></div>
            <div class="title-box">
                <b>开启回忆长廊</b>
                <span>收录了 <span style="color:#ff7e5f; font-weight:900;">28179</span> 条珍贵瞬间</span>
            </div>
        </a>
		
        <div class="sub-grid">
            <a href="Star.html" class="sub-item">
                <div class="icon-sm"><img src="icon/like.png" alt="星标拾遗"></div>
                <b>星标拾遗</b>
                <span>已收藏 <span id="fav-count" style="color:#ff7e5f; font-weight:900;">0</span> 句</span>
            </a>

            <a href="Radio.html" class="sub-item">
                <div class="icon-sm"><img src="icon/vice.png" alt="语音电台"></div>
                <b>语音电台</b>
                <span>听听那些瞬间</span>
            </a>

            <a href="javascript:void(0)" onclick="alert('时光胶囊正在封闭中...')" class="sub-item" style="opacity: 0.9;">
                <div class="icon-sm"><img src="icon/lite.png" alt="时光胶囊" style="transform: scale(1.35);"></div>
                <b>时光胶囊</b>
                <span>寄给未来</span>
            </a>

            <a href="javascript:void(0)" class="sub-item" style="opacity: 0.7;">
                <div class="icon-sm" style="opacity: 0.6;">🔒</div>
                <b style="opacity: 0.6;">即将开启</b>
                <span style="opacity: 0.6;">未完待续</span>
            </a>
        </div>
    </div>

    <div class="footer-area">
        <div class="wish">
            “我们这一路走来真的很容易”<br>
            <span class="highlight">祝你生日快乐！</span>
        </div>
        <div style="text-align: center;">
            <a href="About.html" class="footer-link">关于软件 · 时光拾遗</a>
        </div>
    </div>

    <script>
        const startDate = new Date("2023-09-01 00:00:00"); 
        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;
            const totalDays = Math.floor(diff / (1000 * 60 * 60 * 24));
            const years = Math.floor(totalDays / 365);
            const days = totalDays % 365;
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const mins = Math.floor((diff / (1000 * 60)) % 60);
            const secs = Math.floor((diff / 1000) % 60);
            document.getElementById('together-timer').innerText = `认识已经：${years}年${days}天${hours}时${mins}分${secs}秒`;
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        const favs = JSON.parse(localStorage.getItem('chat_favs') || '[]');
        if (document.getElementById('fav-count')) document.getElementById('fav-count').innerText = favs.length;
	
        const avatar = document.getElementById('cake-avatar');
        const code = document.getElementById('secret-code');
        const userName = document.getElementById('user-name');
        const timerBox = document.getElementById('together-timer');
        const container = document.getElementById('particle-container');
        
        let longPressTimer, particleInterval, isMagicActive = false;

        function createParticle(x, y) {
            const particle = document.createElement('div');
            particle.innerHTML = '⭐';
            particle.style.cssText = `position:fixed; left:${x}px; top:${y}px; font-size:${Math.random()*20+10}px; pointer-events:none; transition:all ${Math.random()*2+1}s ease-out; opacity:1;`;
            container.appendChild(particle);
            setTimeout(() => {
                const angle = Math.random() * Math.PI * 2, dist = Math.random() * 200 + 100;
                particle.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px) rotate(${Math.random()*360}deg)`;
                particle.style.opacity = '0';
            }, 10);
            setTimeout(() => particle.remove(), 3000);
        }

        function startMagic() {
            if (isMagicActive) return;
            isMagicActive = true;
            avatar.classList.add('active');
            userName.style.opacity = '0';
            timerBox.style.opacity = '0'; 
            code.classList.add('show');
            particleInterval = setInterval(() => {
                const rect = avatar.getBoundingClientRect();
                createParticle(rect.left + rect.width/2, rect.top + rect.height/2);
            }, 150);
            if (window.navigator.vibrate) window.navigator.vibrate(50);
        }

        function stopMagic() {
            isMagicActive = false;
            avatar.classList.remove('active');
            userName.style.opacity = '1';
            timerBox.style.opacity = '1';
            code.classList.remove('show');
            clearInterval(particleInterval);
        }

        avatar.addEventListener('touchstart', (e) => { e.preventDefault(); longPressTimer = setTimeout(startMagic, 400); });
        avatar.addEventListener('touchend', () => { clearTimeout(longPressTimer); if (isMagicActive) stopMagic(); });
        avatar.addEventListener('mousedown', () => { longPressTimer = setTimeout(startMagic, 400); });
        avatar.addEventListener('mouseup', () => { clearTimeout(longPressTimer); if (isMagicActive) stopMagic(); });
    </script>
</body>
</html>
