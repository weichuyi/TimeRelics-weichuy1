<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Report</title>
    <style>
	
		* {
            -webkit-tap-highlight-color: transparent; 
            -webkit-touch-callout: none; 
            -webkit-user-select: none; 
            user-select: none;
        }
		
        ::-webkit-scrollbar { display: none; width: 0; height: 0; color: transparent; }
        html, body { -ms-overflow-style: none; scrollbar-width: none; }
        
        input, textarea { -webkit-user-select: auto; user-select: auto; }
	
        :root {
            --bg: #fff9f5;         /* ★ 统一奶油底色 */
            --text-dark: #111111;  /* ★ 统一高级纯黑 */
            --text-light: #555555; /* ★ 次级文字加深，提升对比度 */
            --accent: #8e7f74;     
            --orange: #ff7e5f;
            --radius: 25px;
        }

        body {
            margin: 0; padding: 0; 
            background: var(--bg); /* 暂时无壁纸，保留纯净底色 */
            font-family: -apple-system, "PingFang SC", sans-serif;
            color: var(--text-dark);
            overflow-x: hidden;
            animation: fadeInPage 1s ease-out forwards;
			overscroll-behavior: none; 
        }
        @keyframes fadeInPage { from { opacity: 0; } to { opacity: 1; } }

        /* ★ 核心同步：浅色毛玻璃头部 + 黑色悬浮画框描边 */
        .header {
            position: fixed; top: 0; left: 0; width: 100%; box-sizing: border-box; z-index: 100;
            
            background: rgba(255, 255, 255, 0.65); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            
            border-bottom: 2px solid rgba(0, 0, 0, 0.8);
            border-left: 1.5px solid rgba(0, 0, 0, 0.15);
            border-right: 1.5px solid rgba(0, 0, 0, 0.15);
            border-top: none;
            
            border-radius: 0 0 24px 24px;
            padding: calc(12px + env(safe-area-inset-top)) 16px 12px 16px;
            display: flex; align-items: center;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
        }
        
        .back-btn { color: #111; text-decoration: none; font-size: 20px; font-weight: 900; margin-right: 15px; padding: 0 10px 0 0; }
        .title { color: #111; font-size: 18px; margin: 0; font-weight: 900; letter-spacing: 1px; }

        /* ★ 增加 top padding 防止被固定头部遮挡 */
        .container { padding: calc(85px + env(safe-area-inset-top)) 20px calc(40px + env(safe-area-inset-bottom)) 20px; display: flex; flex-direction: column; gap: 20px; }

        /* ★ 核心同步：亚克力半透明数据卡片 */
        .report-card {
            background: rgba(255, 255, 255, 0.65); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: var(--radius);
            padding: 25px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center; position: relative; overflow: hidden;
            opacity: 0; transform: translateY(30px); transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .report-card.show { opacity: 1; transform: translateY(0); }

        .section-tag { 
            display: inline-block; font-size: 11px; color: var(--orange); 
            background: rgba(255, 126, 95, 0.1); padding: 4px 12px; border-radius: 12px; 
            letter-spacing: 1px; margin-bottom: 15px; font-weight: bold;
        }
        .section-title { font-size: 20px; font-weight: 900; color: var(--text-dark); margin: 0 0 25px 0; }

        .big-data-row { display: flex; justify-content: space-around; margin-bottom: 25px; }
        .data-item { display: flex; flex-direction: column; align-items: center; }
        .data-num { font-size: 28px; font-weight: 900; color: var(--orange); margin-bottom: 5px; font-family: 'Helvetica Neue', Arial, sans-serif;}
        .data-label { font-size: 12px; color: var(--text-light); font-weight: bold;}

        .small-data-row { display: flex; justify-content: space-between; padding: 0 10px; margin-bottom: 10px; }
        .small-data-num { font-size: 20px; font-weight: 900; color: var(--text-dark); font-family: 'Helvetica Neue', Arial, sans-serif;}

        .chart-container { display: flex; align-items: flex-end; justify-content: space-between; height: 80px; margin-top: 10px; padding: 0 10px; border-bottom: 2px dashed rgba(0,0,0,0.1); }
        .bar-wrapper { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 18%; }
        .bar { width: 100%; background: rgba(0,0,0,0.05); border-radius: 6px 6px 0 0; transition: height 1s ease-out; height: 0; }
        .bar.highlight { background: linear-gradient(180deg, #ff7e5f 0%, #feb47b 100%); box-shadow: 0 -4px 10px rgba(255,126,95,0.3); }
        .bar-val { font-size: 10px; font-weight: bold; color: var(--text-light); }
        .bar.highlight + .bar-label + .bar-val { color: var(--orange); } 
        .bar-label { font-size: 10px; color: var(--text-light); font-weight: bold; }

        .word-cloud { position: relative; height: 210px; display: flex; align-items: center; justify-content: center; }
        .word { position: absolute; font-weight: bold; white-space: nowrap; animation: float 4s ease-in-out infinite alternate; }
        
        .delay-1 { animation-delay: 0.2s; } .delay-2 { animation-delay: 0.7s; } 
        .delay-3 { animation-delay: 1.1s; } .delay-4 { animation-delay: 1.6s; }

        @keyframes float { 0% { transform: translate(-50%, calc(-50% - 5px)); } 100% { transform: translate(-50%, calc(-50% + 5px)); } }

        .w-huge { font-size: 34px; color: var(--orange); z-index: 10; text-shadow: 0 4px 10px rgba(255,126,95,0.2);}
        .w-large { font-size: 24px; color: #333; z-index: 9; }
        .w-medium { font-size: 18px; color: #666; z-index: 8; }
        .w-small { font-size: 14px; color: #999; z-index: 7; }

        .w1 { top: 40%; left: 35%; } .w2 { top: 60%; left: 55%; }
        .w3 { top: 25%; left: 50%; } .w4 { top: 75%; left: 30%; }
        .w5 { top: 35%; left: 75%; } .w6 { top: 80%; left: 70%; }
        .w7 { top: 15%; left: 30%; } .w8 { top: 50%; left: 15%; }
        .w9 { top: 50%; left: 85%; } .w10{ top: 90%; left: 50%; }

        /* 熬夜卡片同步毛玻璃质感 */
        .night-mode {
            background: linear-gradient(135deg, rgba(28, 35, 49, 0.85) 0%, rgba(14, 21, 34, 0.85) 100%); 
            color: #d3d7e0;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .night-mode .section-title { color: #f9d423; text-align: left; } 
        .night-mode .section-tag { background: rgba(249, 212, 35, 0.15); color: #f9d423; }
        .night-mode .habit-big { color: #ffffff; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .night-mode .habit-desc { color: #a1a9b8; }
        .night-mode .habit-highlight { color: #f9d423; font-size: 16px; }
        
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.8; animation: twinkle 2s infinite alternate;}
        @keyframes twinkle { 0% {opacity: 0.3; transform: scale(0.8);} 100% {opacity: 1; transform: scale(1.2);} }

        .habit-box { text-align: left; padding: 10px; position: relative; z-index: 2;}
        .habit-big { font-size: 26px; font-weight: 900; margin-bottom: 12px; }
        .habit-desc { font-size: 14px; line-height: 1.5; font-weight: bold; }
        
    </style>
</head>
<body>

	<div class="header">
	
	
        <a href="javascript:void(0)" onclick="history.back()" class="back-btn">←</a>
		
		
        <h1 class="title">聊过的天 💬</h1>
    </div>

    <div class="container">
        
        <div class="report-card show">
            <div class="section-tag">年度统计</div>
            <h2 class="section-title">全部时间数据概览</h2>
            
            <div class="big-data-row">
                <div class="data-item">
                    <span class="data-num counter" data-target="28179">0</span>
                    <span class="data-label">总消息数</span>
                </div>
                <div class="data-item">
                    <span class="data-num counter" data-target="1278269">0</span>
                    <span class="data-label">总字数</span>
                </div>
            </div>

            <div class="small-data-row">
                <div class="data-item">
                    <span class="small-data-num counter" data-target="1004">0</span>
                    <span class="data-label">图片</span>
                </div>
                <div class="data-item">
                    <span class="small-data-num counter" data-target="869">0</span>
                    <span class="data-label">语音</span>
                </div>
                <div class="data-item">
                    <span class="small-data-num counter" data-target="3859">0</span>
                    <span class="data-label">表情</span>
                </div>
            </div>
        </div>

        <div class="report-card scroll-reveal">
            <div class="section-tag">高光时刻</div>
            <h2 class="section-title" style="text-align: left;">聊得最疯狂的一天</h2>
            <div style="text-align: left; font-size: 13px; color: var(--text-light); line-height: 1.6; font-weight: bold;">
                2024年6月14日，那一天我们仿佛有说不完的话，单日发送消息达到了惊人的 <strong style="color: var(--orange); font-size:15px;">521</strong> 条。
            </div>
            
            <div class="chart-container">
                <div class="bar-wrapper">
                    <div class="bar-val">120</div>
                    <div class="bar" style="--target-height: 25%;"></div>
                    <div class="bar-label">6.12</div>
                </div>
                <div class="bar-wrapper">
                    <div class="bar-val">205</div>
                    <div class="bar" style="--target-height: 40%;"></div>
                    <div class="bar-label">6.13</div>
                </div>
                <div class="bar-wrapper">
                    <div class="bar-val" style="color:var(--orange); font-size:12px;">521</div>
                    <div class="bar highlight" style="--target-height: 100%;"></div>
                    <div class="bar-label" style="color:var(--text-dark); font-weight:900;">6.14</div>
                </div>
                <div class="bar-wrapper">
                    <div class="bar-val">188</div>
                    <div class="bar" style="--target-height: 35%;"></div>
                    <div class="bar-label">6.15</div>
                </div>
                <div class="bar-wrapper">
                    <div class="bar-val">90</div>
                    <div class="bar" style="--target-height: 20%;"></div>
                    <div class="bar-label">6.16</div>
                </div>
            </div>
        </div>

        <div class="report-card scroll-reveal">
            <div class="section-tag">默契密码</div>
            <h2 class="section-title">我们的高频词汇</h2>
            
            <div class="word-cloud">
                <span class="word w-huge w1 delay-1">哈哈哈</span>
                <span class="word w-huge w2 delay-3">笑死我了</span>
                
                <span class="word w-large w3 delay-2">怎么了</span>
                <span class="word w-large w4 delay-4">好的 可以</span>
                <span class="word w-large w5 delay-1">兄弟</span>
                
                <span class="word w-medium w6 delay-3">无敌了</span>
                <span class="word w-medium w7 delay-2">我服了</span>
                <span class="word w-medium w8 delay-4">逆天</span>
                <span class="word w-medium w9 delay-1">哥们</span>
                
                <span class="word w-small w10 delay-2">神经啊</span>
            </div>

        </div>

        <div class="report-card night-mode scroll-reveal">
            <div class="star" style="top: 15%; left: 10%; width: 3px; height: 3px;"></div>
            <div class="star" style="top: 30%; left: 80%; width: 4px; height: 4px; animation-delay: 0.5s;"></div>
            <div class="star" style="top: 70%; left: 20%; width: 2px; height: 2px; animation-delay: 1s;"></div>
            <div class="star" style="top: 85%; left: 85%; width: 3px; height: 3px; animation-delay: 1.5s;"></div>

            <div class="section-tag">生物钟揭秘</div>
            <h2 class="section-title">作息规律</h2>
            
            <div class="habit-box">
                <div class="habit-big">深夜畅聊局 🌙</div>
                <div class="habit-desc">
                    我们在 <span class="habit-highlight">周五 00:00</span> 活跃度达到顶峰（共计 1135 条消息）。<br><br>
                </div>
            </div>
        </div>

        <div style="text-align: center; color: var(--text-light); font-size: 12px; margin-top: 10px; padding-bottom: 20px; font-weight: bold; letter-spacing: 1px;">
            记录不是冰冷的数据。
        </div>

    </div>

    <script>
        function animateCounter(element) {
            const target = +element.getAttribute('data-target');
            const duration = 5000; 
            let startTime = null;

            function step(timestamp) {
                if (!startTime) startTime = timestamp;
                const progress = Math.min((timestamp - startTime) / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 3); 
                const currentNum = Math.floor(easeOut * target);
                
                element.innerText = currentNum.toLocaleString();
                
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                } else {
                    element.innerText = target.toLocaleString();
                }
            }
            window.requestAnimationFrame(step);
        }

        const observerOptions = {
            threshold: 0.15 
        };

        const observer = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('show');
                    
                    const bars = entry.target.querySelectorAll('.bar');
                    bars.forEach(bar => {
                        bar.style.height = bar.getAttribute('style').match(/--target-height:\s*([^;]+)/)[1];
                    });

                    const counters = entry.target.querySelectorAll('.counter');
                    counters.forEach(counter => animateCounter(counter));

                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);

        document.querySelectorAll('.scroll-reveal').forEach(el => {
            observer.observe(el);
        });

        window.onload = function() {
            document.querySelectorAll('.show .counter').forEach(counter => {
                animateCounter(counter);
            });
        };

        window.history.pushState(null, null, window.location.href);
        window.addEventListener('popstate', function () {
            window.location.replace('OurStory.html');
        });
    </script>
</body>
</html>
